<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrador - SportClub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="dashboard-header admin-theme">
<div class="container-fluid">
<div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
<div class="d-flex align-items-center gap-3">
<img src="img/logo.png" alt="Logo SportClub" class="logo-img">
<h1 class="h3 mb-0">Administrador</h1>
</div>
<div class="d-flex gap-2">
<button type="button" class="btn btn-gold" onclick="location.href='configuracion.html'">Editar Perfil</button>
<button type="button" class="btn btn-light" onclick="location.href='login.html'">Cerrar Sesión</button>
</div>
</div>
</div>
</header>

<nav class="navbar navbar-expand-lg admin-nav navbar-dark">
<div class="container-fluid">
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuAdmin">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="menuAdmin">
<ul class="navbar-nav">
<li class="nav-item">
<a class="nav-link active" href="usuarios.html">Usuarios</a>
</li>
<li class="nav-item">
<a class="nav-link" href="reportes.html">Reportes</a>
</li>
<li class="nav-item">
<a class="nav-link" href="configuracion.html">Configuración</a>
</li>
</ul>
</div>
</div>
</nav>

<main class="container-fluid py-4">
<h2 class="mb-4">Panel de Control</h2>

<div class="row g-4">

<div class="col-lg-4">
<div class="card dashboard-card sketch-card h-100">
<div class="card-body">
<h3 class="h5 mb-3">Gestión de Usuarios</h3>

<div class="d-flex justify-content-between border-bottom pb-2 mb-2">
<span>Juan Pérez</span>
<span class="text-muted">Usuario</span>
</div>

<div class="d-flex justify-content-between border-bottom pb-2 mb-2">
<span>María Soto</span>
<span class="text-muted">Coach</span>
</div>

<div class="d-flex justify-content-between">
<span>Pedro Admin</span>
<span class="text-muted">Administrador</span>
</div>

</div>
</div>
</div>

<div class="col-lg-4">
<div class="card dashboard-card sketch-card h-100">
<div class="card-body">
<h3 class="h5 mb-3">Estadísticas</h3>

<div class="bg-light rounded p-3 mb-3 text-center">
<p class="mb-1">Total usuarios</p>
<h2 class="mb-0">120</h2>
</div>

<div class="bg-light rounded p-3 text-center">
<p class="mb-1">Total clases</p>
<h2 class="mb-0">25</h2>
</div>

</div>
</div>
</div>

<div class="col-lg-4">
<div class="card dashboard-card sketch-card h-100">
<div class="card-body">
<h3 class="h5 mb-3">Panel de Control</h3>

<div class="bg-light rounded p-3 mb-3 text-center">
<p class="mb-1">Usuarios activos</p>
<h2 class="mb-0">80</h2>
</div>

<div class="bg-light rounded p-3 text-center">
<p class="mb-1">Clases del día</p>
<h2 class="mb-0">12</h2>
</div>

</div>
</div>
</div>

</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
