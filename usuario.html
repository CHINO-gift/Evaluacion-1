<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Usuario</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="usuario">

<div class="container">

<aside>
<h2>SportClub</h2>
<nav>
<a href="#">Inicio</a>
<a href="#">Reservas</a>
<a href="#">Perfil</a>
</nav>
</aside>

<div class="contenido">

<header>
<div class="header-left">
<img src="img/logo.png">
<h2>Usuario</h2>
</div>

<div>
<button>Editar perfil</button>
<button>Cerrar sesión</button>
</div>
</header>

<main class="grid">

<section class="card perfil">
<h3>Mi Perfil</h3>
<p>Nombre: Juan Pérez</p>
<p>Correo: juan@email.com</p>
<p>Interés: Fitness</p>
</section>

<section class="card progreso">
<h3>Progreso</h3>
<div class="circle">75%</div>
</section>

<section class="card clases">
<h3>Clases Disponibles</h3>
<p>Yoga <button>Reservar</button></p>
<p>Funcional <button>Reservar</button></p>
<p>Spinning <button>Reservar</button></p>
</section>

<section class="card tabla">
<h3>Mis Reservas</h3>
<p>Crossfit – Lunes 18:00</p>
<p>Spinning – Miércoles 19:00</p>
<p>Yoga – Viernes 17:00</p>
</section>

</main>

</div>
</div>

</body>
</html>
