<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuario - SportClub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="dashboard-header user-theme">
<div class="container-fluid">
<div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
<div class="d-flex align-items-center gap-3">
<img src="img/logo.png" alt="Logo SportClub" class="logo-img">
<h1 class="h3 mb-0">Usuario</h1>
</div>
<div class="d-flex gap-2">
<button type="button" class="btn btn-gold">Editar Perfil</button>
<button type="button" class="btn btn-light">Cerrar Sesión</button>
</div>
</div>
</div>
</header>

<nav class="navbar navbar-expand-lg user-nav navbar-dark">
<div class="container-fluid">
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuUsuario">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="menuUsuario">
<ul class="navbar-nav">
<li class="nav-item">
<a class="nav-link active" href="#">Inicio</a>
</li>
<li class="nav-item">
<a class="nav-link" href="#">Reservas</a>
</li>
<li class="nav-item">
<a class="nav-link" href="#">Perfil</a>
</li>
</ul>
</div>
</div>
</nav>

<main class="container py-4">
<h2 class="mb-4">Bienvenido a SportClub</h2>

<div class="row g-4">

<div class="col-lg-4">
<div class="card dashboard-card h-100">
<div class="card-body">
<h3 class="h5 mb-3">Mi Información</h3>
<p><strong>Nombre:</strong> Juan Pérez</p>
<p><strong>Correo:</strong> juan@email.com</p>
<p><strong>Interés:</strong> Fitness</p>
</div>
</div>
</div>

<div class="col-lg-4">
<div class="card dashboard-card h-100">
<div class="card-body">
<h3 class="h5 mb-3">Mis Reservas</h3>
<ul class="list-group list-group-flush">
<li class="list-group-item">Crossfit - Lunes 18:00</li>
<li class="list-group-item">Spinning - Miércoles 19:00</li>
<li class="list-group-item">Yoga - Viernes 17:00</li>
</ul>
</div>
</div>
</div>

<div class="col-lg-4">
<div class="card dashboard-card h-100">
<div class="card-body">
<h3 class="h5 mb-3">Clases Disponibles</h3>
<div class="d-grid gap-3">
<div class="border rounded p-3 d-flex justify-content-between align-items-center">
<span>Yoga</span>
<button type="button" class="btn btn-gold btn-sm">Reservar</button>
</div>
<div class="border rounded p-3 d-flex justify-content-between align-items-center">
<span>Funcional</span>
<button type="button" class="btn btn-gold btn-sm">Reservar</button>
</div>
<div class="border rounded p-3 d-flex justify-content-between align-items-center">
<span>Spinning</span>
<button type="button" class="btn btn-gold btn-sm">Reservar</button>
</div>
</div>
</div>
</div>
</div>

</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
