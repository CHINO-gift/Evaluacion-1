<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - SportClub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="auth-section">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-6 col-lg-4">
<div class="card auth-card shadow-lg">
<div class="card-body p-4 text-center">
<img src="img/logo.png" alt="Logo SportClub" class="logo-img mb-3">
<h2 class="fw-bold mb-4">Crear Cuenta</h2>

<form>
<div class="mb-3 text-start">
<label class="form-label">Nombre completo</label>
<input type="text" class="form-control" placeholder="Ingresa tu nombre">
</div>

<div class="mb-3 text-start">
<label class="form-label">Correo electrónico</label>
<input type="email" class="form-control" placeholder="Ingresa tu correo">
</div>

<div class="mb-3 text-start">
<label class="form-label">Contraseña</label>
<input type="password" class="form-control" placeholder="Crea una contraseña">
</div>

<div class="mb-3 text-start">
<label class="form-label">Deporte o interés</label>
<input type="text" class="form-control" placeholder="Opcional">
</div>

<div class="d-grid mb-3">
<button type="button" class="btn btn-gold" onclick="location.href='login.html'">Registrarse</button>
</div>

<div class="small">
<a href="login.html" class="text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
</div>
</form>

</div>
</div>
</div>
</div>
</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
